# Override opcional: sobe a stack usando imagens publicadas no GHCR
# (sem rebuild local). Uso:
#
#   export GHCR_OWNER=vinicius707   # owner lowercase do GitHub
#   export LIMEN_IMAGE_TAG=latest   # ou main-<sha>
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d --no-build --wait
#
# Requer .env (copie de .env.example). Packages GHCR precisam estar públicos
# ou você autenticado: echo $GH_TOKEN | docker login ghcr.io -u USER --password-stdin

services:
  backend:
    image: ghcr.io/${GHCR_OWNER:-vinicius707}/limen-backend:${LIMEN_IMAGE_TAG:-latest}
    pull_policy: always

  worker:
    image: ghcr.io/${GHCR_OWNER:-vinicius707}/limen-backend:${LIMEN_IMAGE_TAG:-latest}
    pull_policy: always

  worker-video:
    image: ghcr.io/${GHCR_OWNER:-vinicius707}/limen-backend:${LIMEN_IMAGE_TAG:-latest}
    pull_policy: always

  outbox-reconciler:
    image: ghcr.io/${GHCR_OWNER:-vinicius707}/limen-backend:${LIMEN_IMAGE_TAG:-latest}
    pull_policy: always

  frontend:
    image: ghcr.io/${GHCR_OWNER:-vinicius707}/limen-frontend:${LIMEN_IMAGE_TAG:-latest}
    pull_policy: always
