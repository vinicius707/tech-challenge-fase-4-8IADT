services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-limen}
      POSTGRES_USER: ${POSTGRES_USER:-limen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-limen}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-limen}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set limen-local http://minio:9000 "$${MINIO_ACCESS_KEY}" "$${MINIO_SECRET_KEY}"
        mc mb --ignore-existing "limen-local/$${MINIO_BUCKET}"
    restart: "no"

  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-limen}:${POSTGRES_PASSWORD:-limen}@postgres:5432/${POSTGRES_DB:-limen}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-limen}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      HEALTH_CHECK_TIMEOUT_SECONDS: ${HEALTH_CHECK_TIMEOUT_SECONDS:-2}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-use-32chars-min}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-604800}
      AUTH_LOGIN_RATE_LIMIT: ${AUTH_LOGIN_RATE_LIMIT:-5/minute}
      SEED_MEDICO_USERNAME: ${SEED_MEDICO_USERNAME:-}
      SEED_MEDICO_PASSWORD: ${SEED_MEDICO_PASSWORD:-}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:-}
      AZURE_ENABLED: ${AZURE_ENABLED:-false}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-}
      AZURE_LANGUAGE_KEY: ${AZURE_LANGUAGE_KEY:-}
      AZURE_LANGUAGE_ENDPOINT: ${AZURE_LANGUAGE_ENDPOINT:-}
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-default}
      # Vitais ML (Épico 9): thresholds (CI) | isolation_forest | hybrid (demo).
      LIMEN_VITALS_BACKEND: ${LIMEN_VITALS_BACKEND:-thresholds}
      LIMEN_VITALS_IF_MODEL_PATH: /models/vitals/isolation_forest.joblib
    volumes:
      - ./models/vitals:/models/vitals:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  worker:
    build:
      context: ./backend
    command:
      [
        "sh",
        "-c",
        'exec rq worker -u "$$REDIS_URL" "$${RQ_QUEUE_NAME:-default}"',
      ]
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-limen}:${POSTGRES_PASSWORD:-limen}@postgres:5432/${POSTGRES_DB:-limen}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-limen}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-default}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:-}
      AZURE_ENABLED: ${AZURE_ENABLED:-false}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-}
      AZURE_LANGUAGE_KEY: ${AZURE_LANGUAGE_KEY:-}
      AZURE_LANGUAGE_ENDPOINT: ${AZURE_LANGUAGE_ENDPOINT:-}
      LIMEN_VITALS_BACKEND: ${LIMEN_VITALS_BACKEND:-thresholds}
      LIMEN_VITALS_IF_MODEL_PATH: /models/vitals/isolation_forest.joblib
    volumes:
      - ./models/vitals:/models/vitals:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "from redis import Redis; import os; r=Redis.from_url(os.environ[\"REDIS_URL\"], socket_connect_timeout=2); workers=r.smembers(\"rq:workers\"); raise SystemExit(0 if workers else 1)"',
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  worker-video:
    build:
      context: ./backend
    command:
      [
        "sh",
        "-c",
        'exec rq worker -u "$$REDIS_URL" "$${RQ_VIDEO_QUEUE_NAME:-video}"',
      ]
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-limen}:${POSTGRES_PASSWORD:-limen}@postgres:5432/${POSTGRES_DB:-limen}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-limen}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      RQ_QUEUE_NAME: ${RQ_VIDEO_QUEUE_NAME:-video}
      RQ_VIDEO_QUEUE_NAME: ${RQ_VIDEO_QUEUE_NAME:-video}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:-}
      # Épico 11 / ADR 0030: default synthetic (CI/demo). Real → override
      # docker-compose.video-real.yml (+ rebuild com LIMEN_UV_EXTRAS).
      LIMEN_YOLO_BACKEND: ${LIMEN_YOLO_BACKEND:-synthetic}
      LIMEN_POSE_BACKEND: ${LIMEN_POSE_BACKEND:-synthetic}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
      minio:
        condition: service_healthy

  outbox-reconciler:
    build:
      context: ./backend
    command: ["python", "-m", "app.outbox.reconciler"]
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-limen}:${POSTGRES_PASSWORD:-limen}@postgres:5432/${POSTGRES_DB:-limen}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-default}
      OUTBOX_RECONCILE_INTERVAL_SECONDS: ${OUTBOX_RECONCILE_INTERVAL_SECONDS:-5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
