name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Instalar uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.2"
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Instalar dependências congeladas
        run: uv sync --frozen

      - name: Lint placeholder (sintaxe Python)
        run: uv run python -m compileall -q app migrations tests

      - name: Testes
        run: uv run pytest
